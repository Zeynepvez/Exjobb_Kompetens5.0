<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/style.css">
</head>
<script>

    let loggedIn = localStorage.getItem("loggedIn")

    if(!loggedIn){
        window.location.href = "login.html"
    }

</script>

<body>
<header class="header">

    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" placeholder="search courses...">

</header>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="/images/Profil.exjobb.jpg">
            <h3>Member member</h3>

            <a href="profile.html"><button class="purple-btn">View Profile</button></a>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">My courses</a>
            <a href="browse-courses">Browse courses</a>
            <a href="#">Contact</a>
            <a href="#" class="logout-btn">Log out</a>
        </nav>
    </aside>

    <!-- MAIN  -->
    <main class="content">
        <div class="cards">
            <div class="card">
                <h3>Registrations</h3>

                <button class="purple-btn">View Registrations</button>

            </div>

            <div class="card">
                <h3>Learn more about Competence 5.0</h3>

                <button class="purple-btn">Click here</button>
            </div>
        </div>

        <h2 class="course-title">Upcoming courses</h2>
        <div class="course">
        <div class="courses">
            <h4>Course 1</h4>
            <button class="register-btn">Register</button>
        </div>
        <div class="courses">
            <h4>Course 2</h4>
            <button class="register-btn">Register</button>
        </div>
        <div class="courses">
            <h4>Course 3</h4>
            <button class="register-btn">Register</button>
        </div>
        </div>

    </main>
</div>
