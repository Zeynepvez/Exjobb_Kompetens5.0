<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">

</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="layout">
    <div th:replace="~{fragments :: sidebar}"></div>

    <main class="content">


        <div class="welcome-banner">
            <h2 th:text="'Welcome back, ' + ${user.firstName} + '!'">Welcome back!</h2>
            <p>Here's what's happening at Kompetens 5.0</p>
        </div>


        <div class="quick-cards">
            <div class="quick-card">
                <div class="quick-card-icon">📋</div>
                <div>
                    <h4>My Registrations</h4>
                    <p>View and manage your courses</p>
                    <button class="purple-btn" onclick="location.href='/my-courses'">View</button>
                </div>
            </div>
            <div class="quick-card">
                <div class="quick-card-icon">🌐</div>
                <div>
                    <h4>About Kompetens 5.0</h4>
                    <p>Learn more about our mission</p>
                    <button class="purple-btn" onclick="window.open('https://comptelligence.org/about/', '_blank')">Visit website</button>
                </div>
            </div>
        </div>

        <!-- Kurser + Nyheter -->
        <div class="home-grid">

            <!-- Upcoming Courses -->
            <div>
                <div class="section-title">Upcoming Courses</div>

                <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
                    No upcoming courses at the moment.
                </div>

                <div th:each="course : ${courses}" class="course-card" id="course-item">
                    <div>
                        <h4 th:text="${course.title}">Course title</h4>
                        <p th:text="${course.date != null ? course.date : 'Date TBD'}">Date</p>
                    </div>
                    <a th:href="@{/courses/{id}(id=${course.id})}">
                        <button class="purple-btn">View</button>
                    </a>
                </div>
            </div>

            <!-- Latest News -->
            <div>
                <div class="section-title">Latest News</div>

                <div th:if="${#lists.isEmpty(newsList)}" class="empty-state">
                    No news published yet.
                </div>

                <div th:each="item : ${newsList}" class="news-card"
                     th:onclick="'location.href=\'/news/' + ${item.id} + '\''">
                    <h4 th:text="${item.title}">News title</h4>
                    <p th:text="${item.publishDate}">Date</p>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    document.getElementById("searchInput").addEventListener("input", function() {
        let q = this.value.toLowerCase()
        document.querySelectorAll(".course-card").forEach(card => {
            let title = card.querySelector("h4").textContent.toLowerCase()
            card.style.display = title.includes(q) ? "flex" : "none"
        })
    })
</script>

</body>
</html>
