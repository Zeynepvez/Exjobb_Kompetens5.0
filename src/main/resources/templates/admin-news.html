<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin – News</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="profile">
      <img src="/Images/Profil.exjobb.jpg">
      <h3>Administrator</h3>
      <button class="purple-btn">View Profile</button>
    </div>

    <nav>
      <a href="/admin">Overview</a>
      <a href="/admin/courses">Courses</a>
      <a href="/admin/messages">Messages</a>
      <a href="/admin/news" class="active">News</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">Log out</button>
      </form>
    </nav>
  </aside>

  <main class="content">
    <h2>Manage News</h2>

    <div class="card" style="max-width: 900px; margin-bottom: 30px;">
      <h3>Publish News</h3>

      <form action="/admin/news/add" method="post">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" required>
        </div>

        <div class="form-group">
          <label>Publish date</label>
          <input type="date" name="publishDate" required>
        </div>

        <div class="form-group">
          <label>Content</label>
          <textarea name="content" rows="8" required></textarea>
        </div>

        <button type="submit" class="purple-btn" style="margin-top: 15px;">
          Publish
        </button>
      </form>
    </div>

    <h3>All News</h3>

    <div class="table-container" style="max-width: 900px;">
      <table class="members-table">
        <thead>
        <tr>
          <th>Title</th>
          <th>Publish Date</th>
          <th style="text-align: right;">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${newsList}">
          <td>
            <a th:href="@{/admin/news/{id}(id=${item.id})}"
               th:text="${item.title}">
            </a>
          </td>
          <td th:text="${item.publishDate}">Date</td>

          <td class="actions-cell">
            <a th:href="@{/admin/news/edit/{id}(id=${item.id})}">
              <button type="button" class="purple-btn">Edit</button>
            </a>

            <form action="/admin/news/delete" method="post"
                  onsubmit="return confirm('Are you sure?')">
              <input type="hidden" name="id" th:value="${item.id}">
              <button type="submit" class="delete-btn">Delete</button>
            </form>
          </td>

        </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${#lists.isEmpty(newsList)}" class="empty-message">
      <p>No news published yet.</p>
    </div>

  </main>
</div>

</body>
</html>
