<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<!-- LOGIN -->
<div class="auth-container" id="loginBox">
    <h2>Login</h2>
    <form th:action="@{/login}" method="post">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <div class="error-msg" th:if="${loginError}" th:text="${loginError}"></div>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account?</p>
    <p><a href="#" onclick="showStep1(); return false;">Register</a></p>
</div>

<!-- REGISTER STEP 1 -->
<div class="auth-container hidden" id="registerStep1">
    <div class="steps">
        <div class="step active">1</div>
        <div class="step-line"></div>
        <div class="step">2</div>
    </div>
    <h2>Register</h2>
    <p class="required-note">Fields marked with <span>*</span> are required.</p>
    <form id="step1Form">
        <label>First name <span>*</span></label>
        <input type="text" id="firstName" placeholder="First name" required>
        <label>Last name <span>*</span></label>
        <input type="text" id="lastName" placeholder="Last name" required>
        <label>Email <span>*</span></label>
        <input type="email" id="regEmail" placeholder="Email" required>
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="Phone">
        <label>Organisation/Company</label>
        <input type="text" id="organisation" placeholder="Organisation/Company">
        <label>Role/Title</label>
        <input type="text" id="role" placeholder="Role/Title">
        <label>Municipality</label>
        <input type="text" id="municipality" placeholder="Municipality">
        <div class="checkbox-row">
            <input type="checkbox" id="gdpr" required>
            <label for="gdpr">I consent to my personal data being processed <span>*</span></label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the terms and conditions <span>*</span></label>
        </div>
        <button type="submit">Next</button>
    </form>
    <p><button class="link-btn" onclick="showLogin()">Back to login</button></p>
</div>

<!-- REGISTER STEP 2 -->
<div class="auth-container hidden" id="registerStep2">
    <div class="steps">
        <div class="step">1</div>
        <div class="step-line"></div>
        <div class="step active">2</div>
    </div>
    <h2>Choose password</h2>
    <form id="step2Form" th:action="@{/register}" method="post">
        <input type="hidden" id="hiddenFirstName" name="firstName">
        <input type="hidden" id="hiddenLastName" name="lastName">
        <input type="hidden" id="hiddenEmail" name="email">
        <input type="hidden" id="hiddenPhone" name="phone">
        <input type="hidden" id="hiddenOrganisation" name="organisation">
        <input type="hidden" id="hiddenRole" name="role">
        <input type="hidden" id="hiddenMunicipality" name="municipality">
        <label>Password <span style="color:red">*</span></label>
        <input type="password" id="regPass" name="password" placeholder="Password" required>
        <label>Confirm password <span style="color:red">*</span></label>
        <input type="password" id="regPassConfirm" placeholder="Confirm password" required>
        <div class="error-msg" id="passError">Passwords do not match</div>
        <button type="submit">Create account</button>
    </form>
    <p><button class="link-btn" onclick="showStep1()">Back</button></p>
</div>

<script>
    function showLogin() {
        document.getElementById("loginBox").classList.remove("hidden")
        document.getElementById("registerStep1").classList.add("hidden")
        document.getElementById("registerStep2").classList.add("hidden")
    }

    function showStep1() {
        document.getElementById("loginBox").classList.add("hidden")
        document.getElementById("registerStep1").classList.remove("hidden")
        document.getElementById("registerStep2").classList.add("hidden")
    }

    function showStep2() {
        document.getElementById("registerStep1").classList.add("hidden")
        document.getElementById("registerStep2").classList.remove("hidden")
    }

    document.getElementById("step1Form").addEventListener("submit", function(e) {
        e.preventDefault()
        // Flytta data till hidden fields i step2
        document.getElementById("hiddenFirstName").value = document.getElementById("firstName").value
        document.getElementById("hiddenLastName").value = document.getElementById("lastName").value
        document.getElementById("hiddenEmail").value = document.getElementById("regEmail").value
        document.getElementById("hiddenPhone").value = document.getElementById("phone").value
        document.getElementById("hiddenOrganisation").value = document.getElementById("organisation").value
        document.getElementById("hiddenRole").value = document.getElementById("role").value
        document.getElementById("hiddenMunicipality").value = document.getElementById("municipality").value
        showStep2()
    })

    document.getElementById("step2Form").addEventListener("submit", function(e) {
        let pass = document.getElementById("regPass").value
        let passConfirm = document.getElementById("regPassConfirm").value
        let errMsg = document.getElementById("passError")
        if (pass !== passConfirm) {
            e.preventDefault()
            errMsg.style.display = "block"
        }
    })
</script>

</body>
</html>
