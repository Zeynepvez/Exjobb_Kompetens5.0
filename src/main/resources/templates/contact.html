<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div th:replace="~{fragments :: header}"></div>

<div class="layout">
    <div th:replace="~{fragments :: sidebar}"></div>

    <main class="content">
        <h2>Contact us</h2>
        <div class="card">
            <h3>Send message</h3>
            <p th:text="'Logged in as: ' + ${user.firstName} + ' ' + ${user.lastName} + ' (' + ${user.email} + ')'"></p>
            <form action="/contact/send" method="post">
                <div class="form-group">
                    <input type="text" name="subject" placeholder="Subject" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your message..." rows="5" required></textarea>
                </div>
                <button type="submit" class="visit-btn">Send</button>
            </form>
        </div>


        <div class="card">
            <h3>Learn more about Competence 5.0</h3>
            <button class="visit-btn" onclick="window.open('https://comptelligence.org/about/', '_blank')">Visit website</button>
        </div>
    </main>

</div>
</body>
</html>
