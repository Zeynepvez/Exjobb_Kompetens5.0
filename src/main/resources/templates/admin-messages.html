<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Messages</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
            <button class="purple-btn">View Profile</button>
        </div>
        <nav>
            <a href="/admin">Overview</a>
            <a href="/admin/courses">Courses</a>
            <a href="/admin/messages" class="active">Messages</a>
            <a href="/admin/news">News</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">
        <h2>Incoming Messages</h2>

        <div class="table-container">
            <table class="members-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Message</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="msg : ${messages}">
                    <td th:text="${msg.senderName}">Name</td>
                    <td th:text="${msg.senderEmail}">Email</td>
                    <td>
                        <a th:href="@{/admin/message/{id}(id=${msg.id})}"
                           th:text="${msg.subject}">Subject</a>
                    </td>
                    <td th:text="${#strings.length(msg.message) > 40 ? #strings.substring(msg.message, 0, 40) + '...' : msg.message}">Message</td>
                    <td>
                        <form action="/admin/message/delete" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this message?')"
                              style="margin: 0;">
                            <input type="hidden" name="id" th:value="${msg.id}">
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(messages)}" class="empty-message" style="margin-top: 20px;">
            <p>No incoming messages yet.</p>
        </div>
    </main>
</div>

</body>
</html>
