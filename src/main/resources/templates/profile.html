<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3 th:text="${user.firstName + ' ' + user.lastName}">Member</h3>
            <a href="/profile"><button class="purple-btn" type="button">View Profile</button></a>
        </div>
        <nav>
            <a href="/Home">Home</a>
            <a href="/my-courses">My courses</a>
            <a href="/browse-courses">Browse courses</a>
            <a href="/news">News</a>
            <a href="/contact">Contact</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">
        <h2>My Profile</h2>

        <div class="profile-form">
            <form th:action="@{/profile/update}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First name</label>
                        <input type="text" id="firstName" name="firstName" th:value="${user.firstName}">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last name</label>
                        <input type="text" id="lastName" name="lastName" th:value="${user.lastName}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" name="email" th:value="${user.email}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" th:value="${user.phone}">
                    </div>
                    <div class="form-group">
                        <label>Municipality</label>
                        <input type="text" name="municipality" th:value="${user.municipality}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Organisation/Company</label>
                        <input type="text" name="organisation" th:value="${user.organisation}">
                    </div>
                    <div class="form-group">
                        <label>Role/Title</label>
                        <input type="text" name="role" th:value="${user.role}">
                    </div>
                </div>

                <button type="button" class="purple-btn" id="editBtn" onclick="enableEdit()">Edit profile</button>
                <button type="submit" class="purple-btn" id="saveBtn" style="display:none">Save changes</button>
            </form>
        </div>

        <div class="profile-form" style="margin-top: 30px;">
            <h3>Change Password</h3>

            <form action="/profile/change-password" method="post">
                <div class="form-group">
                    <label>Current password</label>
                    <input type="password" name="currentPassword" required>
                </div>

                <div class="form-group">
                    <label>New password</label>
                    <input type="password" name="newPassword" required minlength="8">
                </div>

                <div class="form-group">
                    <label>Confirm new password</label>
                    <input type="password" name="confirmPassword" required minlength="8">
                </div>

                <p th:if="${passwordError}" th:text="${passwordError}" style="color: red; margin-bottom: 10px;"></p>
                <p th:if="${passwordSuccess}" th:text="${passwordSuccess}" style="color: green; margin-bottom: 10px;"></p>

                <button type="submit" class="purple-btn">Change Password</button>
            </form>
        </div>
        <div style="margin-top: 30px;">
            <form action="/profile/delete" method="post"
                  onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.')">

                <button type="submit" class="delete-btn">
                    Delete Account
                </button>
            </form>
        </div>
    </main>
</div>

<script>
    function enableEdit() {
        document.querySelectorAll('.profile-form form:first-of-type input').forEach(input => input.disabled = false);
        document.getElementById("editBtn").style.display = "none";
        document.getElementById("saveBtn").style.display = "inline";
    }
</script>
</body>
</html>
