<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" placeholder="search courses...">
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/images/Profil.exjobb.jpg">
            <h3>Member member</h3>
            <a href="/profile"><button class="purple-btn">View Profile</button></a>
        </div>
        <nav>
            <a href="/Home">Home</a>
            <a href="#">My courses</a>
            <a href="#">Browse courses</a>
            <a href="#">Settings</a>
            <a href="#" class="logout-btn">Log out</a>
        </nav>
    </aside>

    <main class="content">
        <h2>My Profile</h2>
        <div class="profile-form">
            <div class="form-row">
                <div class="form-group">
                    <label>First name</label>
                    <input type="text" value="Member">
                </div>
                <div class="form-group">
                    <label>Last name</label>
                    <input type="text" value="Member">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" value="member@example.com">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Municipality</label>
                    <input type="text">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Organisation/Company</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Role/Title</label>
                    <input type="text">
                </div>
            </div>
            <button class="purple-btn">Edit profile</button>
        </div>
    </main>
</div>

</body>
</html>
