<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Kompetens 5.0</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>

</header>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>

        </div>


        <nav>
            <a href="/admin"  class="active">Overview</a>
            <a href="/admin/courses">Courses</a>
            <a href="/admin/messages">Messages</a>
            <a href="/admin/admin-members">Members</a>
            <a href="/admin/news">News</a>
            <div class="divider"></div>

            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>



    <!-- MAIN -->
    <main class="content">






        <div class="welcome-banner" style="margin-bottom: 30px;">
            <h2>Welcome back, Administrator!</h2>
            <p>Here's what's happening at Kompetens 5.0</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Members</h3>
                <p th:text="${totalMembers} + ' registered members'">0 registered members</p>
                <button class="purple-btn"
                        onclick="location.href='/admin/admin-members'">
                    Manage Members
                </button>
            </div>


            <div class="card">
                <h3>Total Courses</h3>
                <p th:text="${totalCourses} + ' active courses'">0 active courses</p>
                <button class="purple-btn" onclick="location.href='/admin/courses'">Manage Courses</button>
            </div>

            <div class="card">
                <h3>Total Registrations</h3>
                <p th:text="${totalRegistrations} + ' course registrations'">0 course registrations</p>
            </div>
        </div>

    </main>
</div>

</body>
</html>
