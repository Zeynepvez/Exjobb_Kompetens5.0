<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Members</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
        </div>

        <nav>
            <a href="/admin">Overview</a>
            <a href="/admin/courses">Courses</a>
            <a href="/admin/messages">Messages</a>
            <a href="/admin/admin-members" class="active">Members</a>
            <a href="/admin/news">News</a>
            <div class="divider"></div>


            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">
        <h2>Manage Members</h2>

        <div style="margin-bottom: 20px; max-width: 400px;">
            <input type="text" id="memberSearch" class="search" placeholder="Search members..."
                   style="position: static; transform: none; left: auto; width: 100%;">
        </div>

        <div class="table-container">
            <table class="members-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Organisation</th>
                    <th>Role</th>
                    <th>Municipality</th>
                    <th>Phone</th>
                    <th>Registrations</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="member : ${members}">
                    <td>
                        <a th:href="@{/admin/member/{id}(id=${member.id})}"
                           th:text="${member.firstName + ' ' + member.lastName}">
                            Member Name
                        </a>
                    </td>

                    <td th:text="${member.email}">email@example.com</td>
                    <td th:text="${member.organisation}">Organisation</td>
                    <td th:text="${member.role}">Role</td>
                    <td th:text="${member.municipality}">Municipality</td>
                    <td th:text="${member.phone}">Phone</td>

                    <td th:text="${memberRegistrationCounts[member.id] != null ? memberRegistrationCounts[member.id] : 0}">
                        0
                    </td>

                    <td>
                        <form th:action="@{/admin/delete-member}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this member?')">
                            <input type="hidden" name="id" th:value="${member.id}">
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <a href="/admin/export/members">
            <button class="purple-btn" style="margin-top: 20px">Export Members (CSV)</button>
        </a>
    </main>
</div>

<script>
    document.getElementById("memberSearch").addEventListener("input", function () {
        const query = this.value.toLowerCase();
        const rows = document.querySelectorAll(".members-table tbody tr");

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? "" : "none";
        });
    });
</script>

</body>
</html>
