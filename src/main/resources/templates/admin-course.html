<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
            <button class="purple-btn">View Profile</button>
        </div>
        <nav>
            <a href="/admin">Overview</a>
            <a href="/admin/courses" class="active">Courses</a>
            <a href="#">News</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">
        <h2 th:text="${course.title}">Course Title</h2>

        <div class="profile-form" style="margin-bottom: 40px;">
            <div class="form-row">
                <div class="form-group">
                    <label>Description</label>
                    <p th:text="${course.description != null ? course.description : '-'}">-</p>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <p th:text="${course.date != null ? course.date : '-'}">-</p>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Location</label>
                    <p th:text="${course.location != null ? course.location : '-'}">-</p>
                </div>
                <div class="form-group">
                    <label>Participants</label>
                    <p th:text="${participantCount}">0</p>
                </div>
            </div>
        </div>

        <h3>Participants (<span th:text="${participantCount}">0</span>)</h3>

        <div class="table-container">
            <table class="members-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Organisation</th>
                    <th>Role</th>
                    <th>Municipality</th>
                    <th>Phone</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reg : ${registrations}">
                    <td th:text="${reg.user.firstName} + ' ' + ${reg.user.lastName}">John Doe</td>
                    <td th:text="${reg.user.email}">john@example.com</td>
                    <td th:text="${reg.user.organisation != null ? reg.user.organisation : '-'}">-</td>
                    <td th:text="${reg.user.role != null ? reg.user.role : '-'}">-</td>
                    <td th:text="${reg.user.municipality != null ? reg.user.municipality : '-'}">-</td>
                    <td th:text="${reg.user.phone != null ? reg.user.phone : '-'}">-</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(registrations)}" style="margin-top: 20px;">
            <p>No members are registered for this course yet.</p>
        </div>
    </main>
</div>
</body>
</html>
