<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>News</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="layout">
    <div th:replace="~{fragments :: sidebar}"></div>

    <main class="content">
        <h2>News</h2>

        <div class="my-courses-grid">
            <div class="my-course-card" th:each="item : ${newsList}">
                <h3 th:text="${item.title}">Title</h3>
                <p><strong th:text="${item.publishDate}">Date</strong></p>
                <a th:href="@{/news/{id}(id=${item.id})}">
                    <button type="button" class="purple-btn">Read more</button>
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(newsList)}" class="empty-message">
            <p>No news available yet.</p>
            <style>

            </style>
        </div>
    </main>
</div>

</body>
</html>
