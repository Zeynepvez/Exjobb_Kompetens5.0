<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Message Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
            <button class="purple-btn">View Profile</button>
        </div>
        <nav>
            <a href="/admin">Overview</a>
            <a href="/admin/courses">Courses</a>
            <a href="/admin/messages" class="active">Messages</a>
            <a href="/admin/news">News</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">


        <h2>Message Details</h2>

        <div class="profile-form" style="margin-bottom: 30px;">
            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <p th:text="${message.senderName}">Name</p>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <p th:text="${message.senderEmail}">Email</p>
                </div>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <p th:text="${message.subject}">Subject</p>
            </div>

            <div class="form-group">
                <label>Message</label>
                <p th:text="${message.message}">Message text</p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <form action="/admin/message/delete" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this message?')"
                          style="margin: 0;">
                        <input type="hidden" name="id" th:value="${message.id}">
                        <button type="submit" class="delete-btn">Delete Message</button>
                    </form>

                    <a th:href="'mailto:' + ${message.senderEmail} + '?subject=' + ${'Re: ' + message.subject}"
                       class="purple-btn"
                       style="text-decoration: none; display: inline-block;">
                        Reply
                    </a>
                </div>
    </main>
</div>

</body>
</html>
