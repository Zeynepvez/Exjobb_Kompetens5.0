<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Kompetens 5.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
    <input type="text" class="search" placeholder="Search...">
</header>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
            <button class="purple-btn">Admin Panel</button>
        </div>

        <nav>
            <a href="#">Dashboard</a>
            <a href="#">Members</a>
            <a href="#">Courses</a>
            <a href="#">News</a>
            <a href="#">Log out</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="content">

        <h2>Dashboard</h2>

        <div class="cards">
            <div class="card">
                <h3>Total Members</h3>
                <p>0 registered members</p>
                <button class="purple-btn">Manage Members</button>
            </div>

            <div class="card">
                <h3>Total Courses</h3>
                <p>0 active courses</p>
                <button class="purple-btn">Manage Courses</button>
            </div>

            <div class="card">
                <h3>Total Registrations</h3>
                <p>0 course registrations</p>
            </div>
        </div>

        <h2 class="course-title">Members</h2>

        <div class="courses">
            <h4>Member 1</h4>
        </div>
        <div class="courses">
            <h4>Member 2</h4>
        </div>

    </main>
</div>

</body>
</html>
