<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" id="searchInput" placeholder="search courses...">
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3 th:text="${user.firstName + ' ' + user.lastName}">Member</h3>
            <a href="/profile"><button class="purple-btn">View Profile</button></a>
        </div>
        <nav>
            <a href="/Home">Home</a>
            <a href="/my-courses" class="active">My courses</a>
            <a href="/browse-courses">Browse courses</a>
            <a href="/news">News</a>
            <a href="/contact">Contact</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">
        <h2>My Courses</h2>
        <div class="my-courses-grid">
            <div class="my-course-card" th:each="reg : ${registrations}">
                <h3 th:text="${reg.course.title}">Course Title</h3>
                <p th:text="${reg.course.description != null ? reg.course.description : ''}"></p>
                <p th:if="${reg.course.date != null}">Date: <strong th:text="${reg.course.date}"></strong></p>
                <p th:if="${reg.course.location != null}">Location: <strong th:text="${reg.course.location}"></strong></p>
                <form th:action="@{/courses/unregister}" method="post">
                    <input type="hidden" name="courseId" th:value="${reg.course.id}">
                    <button type="submit" class="delete-btn">Unregister</button>
                </form>
            </div>
            <p th:if="${#lists.isEmpty(registrations)}">You have not registered for any courses yet.</p>
        </div>
    </main>
</div>

<script>
    document.getElementById("searchInput").addEventListener("input", function() {
        let q = this.value.toLowerCase()
        document.querySelectorAll(".my-course-card").forEach(card => {
            let title = card.querySelector("h3").textContent.toLowerCase()
            card.style.display = title.includes(q) ? "flex" : "none"
        })
    })
</script>
</body>
</html>
