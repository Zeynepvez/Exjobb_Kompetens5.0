<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<script>

</script>

<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" id="searchInput" placeholder="search courses...">
</header>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3 th:text="${user.firstName + ' ' + user.lastName}">Member</h3>
            <a href="/profile"><button class="purple-btn">View Profile</button></a>
        </div>

        <nav>
            <a href="/Home">Home</a>
            <a href="/my-courses">My courses</a>
            <a href="/browse-courses" class="active">Browse courses</a>
            <a href="/contact">Contact</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">
        <h2>Browse Courses</h2>

        <div class="my-courses-grid">

            <div class="my-course-card">
                <h3>Course 1: Java Programming</h3>
                <p>Status: <strong>Ongoing</strong></p>
                <p>Progress: 75%</p>
                <button class="purple-btn">Continue</button>
            </div>

            <div class="my-course-card">
                <h3>Course 2: Web Development</h3>
                <p>Status: <strong>Completed</strong></p>
                <p>Progress: 100%</p>
                <button class="purple-btn">View Certificate</button>
            </div>

            <div class="my-course-card">
                <h3>Course 3: Database Design</h3>
                <p>Status: <strong>Not started</strong></p>
                <p>Progress: 0%</p>
                <button class="purple-btn">Start</button>
            </div>
        </div>
    </main>
</div>
<script>
    document.getElementById("searchInput").addEventListener("input", function() {
        let q = this.value.toLowerCase()
        document.querySelectorAll(".my-course-card").forEach(card => {
            let title = card.querySelector("h3").textContent.toLowerCase()
            card.style.display = title.includes(q) ? "flex" : "none"
        })
    })
</script>
</body>
</html>
