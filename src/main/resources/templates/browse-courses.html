<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('searchInput');
        const courseCards = document.querySelectorAll('.my-course-card');

        searchInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            courseCards.forEach(function (card) {
                const title = card.querySelector('h3')?.textContent.toLowerCase() || '';
                const description = card.querySelector('p')?.textContent.toLowerCase() || '';
                const matches = title.includes(query) || description.includes(query);
                card.style.display = matches ? '' : 'none';
            });
        });
    });
</script>

<body>
<div th:replace="~{fragments :: header}"></div>

<div class="layout">
    <div th:replace="~{fragments :: sidebar}"></div>

    <main class="content">
        <h2>Browse Courses</h2>
        <div class="my-courses-grid">
            <div class="my-course-card"
                 th:each="course : ${courses}"
                 th:onclick="|window.location='/courses/${course.id}'|"
                 style="cursor: pointer;">

                <h3 th:text="${course.title}">Course Title</h3>

                <p th:text="${course.description != null ? course.description : ''}"></p>

                <p th:if="${course.date != null}">
                    Date: <strong th:text="${course.date}"></strong>
                </p>

                <p th:if="${course.location != null}">
                    Location: <strong th:text="${course.location}"></strong>
                </p>

                <form th:action="@{/courses/register}"
                      method="post"
                      th:if="${!registeredCourseIds.contains(course.id)}"
                      onclick="event.stopPropagation();">

                    <input type="hidden"
                           name="courseId"
                           th:value="${course.id}">

                    <button type="submit" class="purple-btn">
                        Register
                    </button>
                </form>

                <button class="register-btn"
                        disabled
                        th:if="${registeredCourseIds.contains(course.id)}"
                        onclick="event.stopPropagation();">
                    Already registered
                </button>

            </div>
            <p th:if="${#lists.isEmpty(courses)}">No courses available yet.</p>
        </div>
    </main>
</div>
</body>
</html>
