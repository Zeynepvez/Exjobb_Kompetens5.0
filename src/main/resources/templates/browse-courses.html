<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<script>
    let loggedIn = localStorage.getItem("loggedIn")
    if(!loggedIn){
        window.location.href = "login.html"
    }
</script>

<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" placeholder="search courses...">
</header>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="/images/Profil.exjobb.jpg">
            <h3>Member member</h3>
            <a href="profile.html"><button class="purple-btn">View Profile</button></a>
        </div>

        <nav>
            <a href="Home">Home</a>
            <a href="my-courses">My courses</a>
            <a href="contact">Contact</a>
            <a href="#" class="logout-btn">Log out</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">
        <h2>Browse Courses</h2>

        <div class="my-courses-grid">

            <div class="my-course-card">
                <h3>Course 1: Java Programming</h3>
                <p>Status: <strong>Ongoing</strong></p>
                <p>Progress: 75%</p>
                <button class="purple-btn">Continue</button>
            </div>

            <div class="my-course-card">
                <h3>Course 2: Web Development</h3>
                <p>Status: <strong>Completed</strong></p>
                <p>Progress: 100%</p>
                <button class="purple-btn">View Certificate</button>
            </div>

            <div class="my-course-card">
                <h3>Course 3: Database Design</h3>
                <p>Status: <strong>Not started</strong></p>
                <p>Progress: 0%</p>
                <button class="purple-btn">Start</button>
            </div>
        </div>
    </main>
</div>
</body>
</html>
