<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('searchInput');
        const courseCards = document.querySelectorAll('.my-course-card');

        searchInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            courseCards.forEach(function (card) {
                const title = card.querySelector('h3')?.textContent.toLowerCase() || '';
                const description = card.querySelector('p')?.textContent.toLowerCase() || '';
                const matches = title.includes(query) || description.includes(query);
                card.style.display = matches ? '' : 'none';
            });
        });
    });
</script>

<body>
<header class="header">
    <div class="logo">Kompetens 5.0</div>
    <input type="text" class="search" id="searchInput" placeholder="search courses...">
</header>

<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3 th:text="${user.firstName + ' ' + user.lastName}">Member</h3>
            <a href="/profile"><button class="purple-btn">View Profile</button></a>
        </div>

        <nav>
            <a href="/Home">Home</a>
            <a href="/my-courses">My courses</a>
            <a href="/browse-courses" class="active">Browse courses</a>
            <a href="/news">News</a>
            <a href="/contact">Contact</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>
    <main class="content">
        <h2>Browse Courses</h2>
        <div class="my-courses-grid">
            <div class="my-course-card" th:each="course : ${courses}">
                <h3 th:text="${course.title}">Course Title</h3>
                <p th:text="${course.description != null ? course.description : ''}"></p>
                <p th:if="${course.date != null}">Date: <strong th:text="${course.date}"></strong></p>
                <p th:if="${course.location != null}">Location: <strong th:text="${course.location}"></strong></p>

                <form th:action="@{/courses/register}" method="post" th:if="${!registeredCourseIds.contains(course.id)}">
                    <input type="hidden" name="courseId" th:value="${course.id}">
                    <button type="submit" class="purple-btn">Register</button>
                </form>
                <button class="register-btn" disabled th:if="${registeredCourseIds.contains(course.id)}">Already registered</button>
            </div>
            <p th:if="${#lists.isEmpty(courses)}">No courses available yet.</p>
        </div>
    </main>
</body>
</html>
