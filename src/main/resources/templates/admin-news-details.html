<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – News Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">Kompetens 5.0 — Admin</div>
</header>

<div class="layout">

    <aside class="sidebar">
        <div class="profile">
            <img src="/Images/Profil.exjobb.jpg">
            <h3>Administrator</h3>
            <button class="purple-btn">View Profile</button>
        </div>

        <nav>
            <a href="/admin">Overview</a>
            <a href="/admin/courses">Courses</a>
            <a href="/admin/messages">Messages</a>
            <a href="/admin/news" class="active">News</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Log out</button>
            </form>
        </nav>
    </aside>

    <main class="content">

        <a href="/admin/news">← Back to News</a>

        <div class="card" style="max-width: 900px; margin-top: 20px;">
            <h2 th:text="${news.title}">Title</h2>

            <p style="color: gray;">
                <strong th:text="${news.publishDate}">Date</strong>
            </p>

            <p th:text="${news.content}"
               style="white-space: pre-line; line-height: 1.6;">
            </p>
        </div>

    </main>
</div>

</body>
</html>
